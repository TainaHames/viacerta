[build]
  publish = "."

[[redirects]]
  from = "/admin"
  to = "/nexus_viacerta_admin.html"
  status = 200

[[redirects]]
  from = "/operacao"
  to = "/nexus_viacerta_operacao.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
